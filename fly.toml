# fly.toml — Montferrand Agent
#
# See https://fly.io/docs/reference/configuration/

app = 'montferrand-agent'
primary_region = 'yyz'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[mounts]
  source = 'montferrand_data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
